name: Check pattern links

# Weekly walk of every external URL in the agentic-design-patterns catalog.
# Files broken-link issues with de-duplication so a multi-week outage doesn't
# open dozens of identical issues.

on:
  schedule:
    # Mondays at 14:00 UTC (07:00 PT). Off-peak for arXiv / IEEE.
    - cron: '0 14 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: check-pattern-links
  cancel-in-progress: false

jobs:
  check-links:
    name: Walk catalog URLs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run link check
        id: linkcheck
        run: |
          set -e
          pnpm exec tsx scripts/check-pattern-links.ts --json-only > link-results.json
          echo "results-path=link-results.json" >> "$GITHUB_OUTPUT"

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-check-results
          path: link-results.json
          retention-days: 30

      - name: File or update broken-link issues
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            let summary;
            try {
              summary = JSON.parse(fs.readFileSync('link-results.json', 'utf8'));
            } catch (err) {
              core.setFailed(`Could not read link-results.json: ${err}`);
              return;
            }

            const broken = Array.isArray(summary.broken) ? summary.broken : [];
            if (broken.length === 0) {
              core.info('No broken links — exiting.');
              return;
            }

            const labels = ['agentic-design-patterns', 'broken-link'];

            // Search-or-create: an issue with the same URL in the title is
            // refreshed (commented on with the latest run), not duplicated.
            for (const item of broken) {
              const title = `[broken-link] ${item.url}`;
              const body = [
                `**URL:** ${item.url}`,
                `**Status:** ${item.status ?? 'n/a'}`,
                `**Reason:** ${item.reason ?? 'unknown'}`,
                ``,
                `**Catalog sources:**`,
                ...item.sources.map((s) => `- ${s}`),
                ``,
                `_Last detected by [check-pattern-links workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})._`,
              ].join('\n');

              // Search open issues with the broken-link label and matching title.
              const q = `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:title "${item.url}" label:broken-link`;
              const search = await github.rest.search.issuesAndPullRequests({ q });
              const existing = search.data.items.find((i) => i.title === title);

              if (existing) {
                core.info(`Updating existing issue #${existing.number} for ${item.url}`);
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  body,
                });
              } else {
                core.info(`Creating new issue for ${item.url}`);
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title,
                  body,
                  labels,
                });
              }
            }

            core.warning(`Filed/updated ${broken.length} broken-link issue(s).`);
