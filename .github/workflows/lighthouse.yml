name: Lighthouse CI

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://detached-node.dev/
            https://detached-node.dev/posts
            https://detached-node.dev/about
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Format results
        if: always()
        run: |
          echo "## Lighthouse Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Audited URLs:" >> $GITHUB_STEP_SUMMARY
          echo "- https://detached-node.dev/" >> $GITHUB_STEP_SUMMARY
          echo "- https://detached-node.dev/posts" >> $GITHUB_STEP_SUMMARY
          echo "- https://detached-node.dev/about" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Full results uploaded as artifacts." >> $GITHUB_STEP_SUMMARY
