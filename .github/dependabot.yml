version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      payload:
        patterns:
          - "@payloadcms/*"
          - "payload"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@playwright/test"
          - "@testing-library/*"
      next-react:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "eslint-config-next"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      ai-sdk:
        patterns:
          - "ai"
          - "@ai-sdk/*"
      dom-testing:
        patterns:
          - "jsdom"
          - "happy-dom"
      types:
        patterns:
          - "@types/*"
    labels:
      - "dependencies"
    ignore:
      # Keep the agentic-pattern teaching sketches on the AI SDK v4 API they
      # document. `ai` / `@ai-sdk/*` are typecheck-only devDependencies with no
      # shipped/runtime impact; the v6 majors break 7 sketches (maxSteps removed,
      # tool() signature changed) for no benefit. See closed PR #314.
      - dependency-name: "ai"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@ai-sdk/*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      gcp-actions:
        patterns:
          - "google-github-actions/*"
      actions-core:
        patterns:
          - "actions/*"
    labels:
      - "dependencies"
      - "github-actions"
