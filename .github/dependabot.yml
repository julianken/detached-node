version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      payload:
        patterns:
          - "@payloadcms/*"
          - "payload"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@playwright/test"
          - "@testing-library/*"
      next-react:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "eslint-config-next"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      ai-sdk:
        patterns:
          - "ai"
          - "@ai-sdk/*"
      dom-testing:
        patterns:
          - "jsdom"
          - "happy-dom"
      types:
        patterns:
          - "@types/*"
    labels:
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      gcp-actions:
        patterns:
          - "google-github-actions/*"
      actions-core:
        patterns:
          - "actions/*"
    labels:
      - "dependencies"
      - "github-actions"
