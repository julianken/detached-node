queue_rules:
  - name: default
    merge_method: squash
    update_method: merge
    queue_conditions:
      - "#approved-reviews-by >= 1"
      - base = main
      - -draft
      - -conflict
      - "check-success = ESLint"
      - "check-success = TypeScript"
      - "check-success = Vitest"
      - "check-success = Next.js Build"
      - "check-success = Analyze Bundle"
      - "check-success = CodeQL Analysis"
